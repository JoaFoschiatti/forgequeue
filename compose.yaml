x-forgequeue-environment: &forgequeue-environment
  DATABASE_URL: postgres://forgequeue:forgequeue@postgres:5432/forgequeue
  OBJECT_STORE_URL: s3://forgequeue
  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_ACCESS_KEY_ID: forgequeue
  S3_SECRET_ACCESS_KEY: forgequeue-secret
  CORS_ORIGIN: http://localhost:5173
  RATE_LIMIT_SALT: local-compose-secret
  SESSION_HOURLY_LIMIT: ${SESSION_HOURLY_LIMIT:-5}
  IP_DAILY_LIMIT: ${IP_DAILY_LIMIT:-20}
  GLOBAL_DAILY_LIMIT: ${GLOBAL_DAILY_LIMIT:-50}
  LEASE_SECONDS: ${LEASE_SECONDS:-60}
  HEARTBEAT_SECONDS: ${HEARTBEAT_SECONDS:-15}
  PROCESSING_TIMEOUT_SECONDS: ${PROCESSING_TIMEOUT_SECONDS:-90}
  DEMO_PROCESSING_DELAY_MILLISECONDS: ${DEMO_PROCESSING_DELAY_MILLISECONDS:-0}
  RUST_LOG: forgequeue_server=info,tower_http=info
  LOG_FORMAT: json
  PDFIUM_LIBRARY_PATH: /usr/local/lib

x-forgequeue-service: &forgequeue-service
  build:
    context: .
  restart: unless-stopped
  init: true
  depends_on:
    postgres:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
  environment: *forgequeue-environment
  read_only: true
  cpus: 1.0
  mem_limit: 512m
  pids_limit: 256
  tmpfs:
    - /tmp:size=128m,mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  stop_grace_period: 15s

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: forgequeue
      POSTGRES_USER: forgequeue
      POSTGRES_PASSWORD: forgequeue
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgequeue -d forgequeue"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: forgequeue
      MINIO_ROOT_PASSWORD: forgequeue-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 forgequeue forgequeue-secret
      && mc mb --ignore-existing local/forgequeue
      && mc anonymous set none local/forgequeue"

  api:
    <<: *forgequeue-service
    command: ["api"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker-1:
    <<: *forgequeue-service
    command: ["worker"]
    environment:
      <<: *forgequeue-environment
      WORKER_ID: worker-1
      WORKER_METRICS_ADDRESS: 0.0.0.0:9091
    ports:
      - "9101:9091"

  worker-2:
    <<: *forgequeue-service
    command: ["worker"]
    environment:
      <<: *forgequeue-environment
      WORKER_ID: worker-2
      WORKER_METRICS_ADDRESS: 0.0.0.0:9091
    ports:
      - "9102:9091"

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost:8080
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
    mem_limit: 128m

  prometheus:
    image: prom/prometheus:v3.6.0
    profiles: ["observability"]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.1.1
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: forgequeue
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./deploy/grafana-datasources.yml:/etc/grafana/provisioning/datasources/forgequeue.yml:ro
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  minio-data:
