name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v5
      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # SQLx records its disabled MySQL driver in Cargo.lock; ForgeQueue only
          # enables PostgreSQL and `cargo tree -i rsa` confirms rsa is unreachable.
          ignore: RUSTSEC-2023-0071

  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: forgequeue
          POSTGRES_USER: forgequeue
          POSTGRES_PASSWORD: forgequeue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forgequeue -d forgequeue"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://forgequeue:forgequeue@localhost:5432/forgequeue
      OBJECT_STORE_URL: memory:///
      RATE_LIMIT_SALT: ci-only
      FORGEQUEUE_DATABASE_TESTS: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - name: Verify committed OpenAPI contract
        run: |
          cargo run -p forgequeue-server -- openapi --output web/openapi.json
          git diff --exit-code -- web/openapi.json
      - name: Migrations and cleanup smoke test
        run: cargo run -p forgequeue-server -- cleanup

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - name: Verify generated TypeScript API types
        working-directory: web
        run: |
          npx openapi-typescript openapi.json -o src/api/schema.d.ts
          git diff --exit-code -- src/api/schema.d.ts
      - working-directory: web
        run: npm run typecheck
      - working-directory: web
        run: npm run lint
      - working-directory: web
        run: npm test
      - working-directory: web
        run: npm run build
      - working-directory: web
        run: npx playwright install --with-deps chromium
      - working-directory: web
        run: npm run test:e2e

  container:
    runs-on: ubuntu-latest
    needs: [security, rust, web]
    steps:
      - uses: actions/checkout@v5
      - name: Start the complete stack
        run: docker compose up --build -d
      - name: End-to-end image and PDF smoke test
        run: bash scripts/smoke.sh
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop the stack
        if: always()
        run: docker compose down --volumes
